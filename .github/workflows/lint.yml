name: Lint

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruff check
        uses: astral-sh/ruff-action@v1
        with:
          args: "check"
      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check"
